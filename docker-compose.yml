services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: cqb-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    restart: unless-stopped
  gitlab-ce:
    image: gitlab/gitlab-ce:latest
    container_name: cqb-gitlab
    hostname: gitlab.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']
        gitlab_rails['gitlab_shell_ssh_port'] = 2224
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
    ports:
      - "8929:8929"
      - "2224:22"
    shm_size: "256m"
    restart: unless-stopped
  pr-agent:
    image: codiumai/pr-agent:latest
    container_name: cqb-pr-agent
    entrypoint: ["python", "-m", "pr_agent.servers.gitlab_webhook"]
    environment:
      PORT: "3000"
      PYTHONPATH: "/app"
    volumes:
      - ./pr-agent/.pr_agent.gitlab.toml:/app/pr_agent/settings/.secrets.toml:ro
    ports:
      - "3033:3000"
    restart: unless-stopped
