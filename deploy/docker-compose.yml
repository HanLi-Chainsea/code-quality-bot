# Production deploy: litellm->MiniMax + PR-Agent webhook server.
# NO GitLab CE here — points at your REAL cloud GitLab.
# Images pinned by digest (supply-chain). Re-pin after testing a new version.
services:
  litellm:
    image: ghcr.io/berriai/litellm@sha256:7c311546c25e7bb6e8cafede9fcd3d0d622ac636b5c9418befaa32e85dfb0186
    container_name: cqb-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # pass through whichever provider key 'reviewer' points at (blank if unused)
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      CQB_REVIEWER_API_KEY: ${CQB_REVIEWER_API_KEY:-claw}   # local oMLX key for the reviewer-local fallback
    extra_hosts:
      - "host.docker.internal:host-gateway"                # reach the host's MLX server for fallback
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"   # loopback only — lets the host-run review-engine reach the reviewer alias
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 768m
    security_opt: ["no-new-privileges:true"]
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
    restart: unless-stopped

  pr-agent:
    # PR-Agent + blast-radius engine patches. The image's ENTRYPOINT runs cqb_patch.bootstrap,
    # which monkeypatches get_pr_diff (context) + PRReviewer (verify) then starts the same server.
    # Rollback = set image back to codiumai/pr-agent@sha256:a5741a479f...e6f, re-add the
    # `entrypoint:` line, set PYTHONPATH "/app", drop the cqb_* env + volume.
    image: cqb-pr-agent-engine:local
    container_name: cqb-pr-agent
    environment:
      PORT: "3000"
      PYTHONPATH: "/app/cqb:/app"          # /app/cqb for cqb_patch + review_engine; /app for pr_agent
      CQB_GITLAB_TOKEN: ${CQB_GITLAB_TOKEN}
      CQB_CLONE_BASE: /cqb/repos
      # Grounded-refutation VERIFY runs on the LOCAL MLX model on the host (reached via
      # host.docker.internal). FIND stays on PR-Agent's own model (MiniMax via litellm).
      # NOTE: without these REVIEWER_* vars the engine defaulted to 127.0.0.1:4000 — which inside
      # this container is its own localhost, NOT cqb-litellm — so verify silently no-op'd. These
      # wire it to a reachable backend for the first time.
      REVIEWER_BASE_URL: "http://host.docker.internal:31968/v1"
      REVIEWER_API_KEY: ${CQB_REVIEWER_API_KEY:-claw}
      REVIEWER_MODEL: "Qwen3.5-9B-MLX-4bit"
      # thinking stays ON (filtered out of parsing by the engine, not disabled); json_object forces
      # valid escaped JSON. Local reasoning is slow -> generous timeout + token budget, low concurrency.
      REVIEWER_EXTRA_BODY: '{"response_format":{"type":"json_object"}}'
      REVIEWER_TIMEOUT: "900"
      REVIEWER_VERIFY_MAX_TOKENS: "20000"
      REVIEWER_MAX_WORKERS: "2"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach the host's MLX server (portable to Linux hosts)
    volumes:
      # real secrets file — created from pr_agent.gitlab.toml.example, gitignored, chmod 600
      - ./pr_agent.gitlab.toml:/app/pr_agent/settings/.secrets.toml:ro
      - cqb_repos:/cqb/repos               # persistent per-repo clones + graphs (engine)
    depends_on:
      litellm: { condition: service_healthy }
    ports:
      - "127.0.0.1:3033:3000"   # localhost only; a tunnel (with TLS) exposes it
    mem_limit: 1g
    security_opt: ["no-new-privileges:true"]
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
    restart: unless-stopped

volumes:
  cqb_repos:

networks:
  default:
    name: cqb-net
